upstream app_server {
    server app:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name ${DOMAIN:-localhost};

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect to HTTPS (enable after cert is issued)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name ${DOMAIN:-localhost};

    # TLS certificates (Certbot)
    ssl_certificate /etc/letsencrypt/live/${DOMAIN:-localhost}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN:-localhost}/privkey.pem;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # API endpoints
    location / {
        proxy_pass http://app_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Rate limiting
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health check (no rate limit)
    location = /health {
        proxy_pass http://app_server;
        proxy_set_header Host $host;
        limit_req off;
    }

    # Metrics (internal only)
    location = /metrics {
        proxy_pass http://app_server;
        proxy_set_header Host $host;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
    }

    # Static assets
    location /static/ {
        proxy_pass http://app_server;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Swagger docs
    location /docs {
        proxy_pass http://app_server;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://app_server;
        proxy_set_header Host $host;
    }
}
