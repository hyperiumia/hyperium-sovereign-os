# TEMPORARY: HTTP-only config for initial setup / cert generation
# Remove this file and rename sovereign.conf after running certbot
#
# Usage:
#   1. Deploy with this file active (HTTP only)
#   2. Run: docker compose -f docker-compose.prod.yml run --rm certbot certonly --webroot -w /var/www/certbot --email admin@DOMAIN -d DOMAIN --agree-tos --no-eff-email
#   3. Edit sovereign.conf: uncomment the HTTPS server block
#   4. Remove this file: rm nginx/conf.d/init-only.conf
#   5. Restart: docker compose -f docker-compose.prod.yml restart nginx

server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
