name: Sovereign-OS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd server
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      - name: Verify directories
        run: |
          cd server
          mkdir -p app/keys evidence_store config
          ls -la

      - name: Verify imports
        run: |
          cd server
          python -c "
          import sys
          print(f'Python: {sys.version}')
          from app.main import app
          print(f'App: {app.title}')
          print(f'Routes: {len(list(app.routes))}')
          "

      - name: Run tests
        run: |
          cd server
          python -m pytest tests/ -v --tb=long -x 2>&1

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sovereign-os:latest ./server

      - name: Verify container
        run: |
          docker run -d --name test-sov -p 8000:8000 \
            -e SOS_DATABASE_URL=sqlite+aiosqlite:///./test.db \
            sovereign-os:latest
          sleep 10
          curl -f http://localhost:8000/health || (docker logs test-sov && exit 1)
          docker stop test-sov
